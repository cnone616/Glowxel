<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>眼神模式预览台</title>
  <style>
    :root {
      --bg: #07131f;
      --panel: rgba(16, 34, 52, 0.94);
      --panel-border: #27435b;
      --text: #d7ebff;
      --muted: #85a4be;
      --accent: #69d6ff;
      --accent-2: #1b6dff;
      --chip: rgba(105, 214, 255, 0.14);
      --active: rgba(105, 214, 255, 0.22);
      --active-border: rgba(155, 220, 255, 0.46);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "PingFang SC", "SF Pro Display", "Helvetica Neue", sans-serif;
      background:
        radial-gradient(circle at top, rgba(105, 214, 255, 0.14), transparent 35%),
        linear-gradient(180deg, #07131f 0%, #030a10 100%);
      color: var(--text);
    }

    .page {
      width: min(1480px, 100%);
      margin: 0 auto;
      padding: 24px;
      display: grid;
      grid-template-columns: 390px minmax(420px, 1fr) 320px;
      gap: 20px;
      align-items: start;
    }

    .column {
      display: grid;
      gap: 18px;
      align-content: start;
    }

    .panel {
      border: 1px solid var(--panel-border);
      background: var(--panel);
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.28);
    }

    h1,
    h2 {
      margin: 0 0 12px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    h1 {
      font-size: 22px;
    }

    h2 {
      font-size: 15px;
      color: var(--accent);
      margin-top: 16px;
    }

    .desc,
    .foot {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
      font-size: 13px;
    }

    .desc + .desc {
      margin-top: 8px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    label {
      display: grid;
      gap: 6px;
      font-size: 12px;
      color: var(--muted);
    }

    .field-name {
      color: var(--text);
      font-size: 13px;
      font-weight: 600;
    }

    .field-code {
      color: var(--accent);
      font-family: "SF Mono", "Menlo", "Consolas", monospace;
      font-size: 11px;
    }

    input[type="number"],
    input[type="color"],
    textarea {
      width: 100%;
      border: 1px solid #35566f;
      background: #091621;
      color: var(--text);
      border-radius: 10px;
      padding: 10px 12px;
      font: inherit;
    }

    input[type="checkbox"] {
      transform: translateY(1px);
      margin-right: 8px;
    }

    .checkbox {
      display: flex;
      align-items: center;
      min-height: 54px;
      padding: 0 2px;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      font: inherit;
      color: #04111a;
      background: linear-gradient(135deg, var(--accent), #9bedff);
      cursor: pointer;
      font-weight: 700;
    }

    button.secondary {
      color: var(--text);
      background: #163146;
      border: 1px solid #2c526d;
    }

    .preview-panel {
      min-height: 720px;
      display: grid;
      align-content: start;
      gap: 18px;
    }

    .preview-wrap {
      display: grid;
      justify-items: center;
      gap: 14px;
      background:
        linear-gradient(180deg, rgba(0, 0, 0, 0.26), transparent),
        repeating-linear-gradient(
          90deg,
          rgba(255, 255, 255, 0.02) 0,
          rgba(255, 255, 255, 0.02) 1px,
          transparent 1px,
          transparent 8px
        ),
        #07111a;
      border-radius: 16px;
      border: 1px solid #20384c;
      padding: 22px;
    }

    canvas {
      width: min(54vw, 560px);
      height: min(54vw, 560px);
      image-rendering: pixelated;
      background: #000;
      border: 10px solid #0d1d2b;
      border-radius: 18px;
      box-shadow:
        0 0 0 1px #29465f,
        0 24px 50px rgba(0, 0, 0, 0.4);
    }

    .status {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }

    .chip {
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      color: var(--text);
      background: var(--chip);
      border: 1px solid rgba(105, 214, 255, 0.24);
    }

    .json-box {
      display: grid;
      gap: 12px;
    }

    textarea {
      min-height: 240px;
      resize: vertical;
      line-height: 1.5;
      font-family: "SF Mono", "Menlo", "Consolas", monospace;
      font-size: 12px;
    }

    .expression-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .expression-button {
      padding: 12px 10px;
      border-radius: 12px;
      border: 1px solid #30556f;
      background: #102434;
      color: var(--text);
      display: grid;
      gap: 4px;
      text-align: left;
      min-height: 66px;
      transition: transform 0.16s ease, border-color 0.16s ease, background 0.16s ease;
    }

    .expression-button:hover {
      transform: translateY(-1px);
      border-color: var(--accent);
    }

    .expression-button.active {
      background: var(--active);
      border-color: var(--active-border);
      box-shadow: inset 0 0 0 1px rgba(155, 220, 255, 0.18);
    }

    .expression-cn {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
    }

    .expression-en {
      font-size: 11px;
      color: var(--muted);
      font-family: "SF Mono", "Menlo", "Consolas", monospace;
    }

    @media (max-width: 1220px) {
      .page {
        grid-template-columns: 1fr;
      }

      .preview-panel {
        min-height: 0;
      }

      canvas {
        width: min(82vw, 560px);
        height: min(82vw, 560px);
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="column">
      <section class="panel">
        <h1>眼神模式预览台</h1>
        <p class="desc">左边调参数，中间看预览，右边直接切换 21 个眼神。</p>
        <p class="desc">这里的 JSON 字段名和板载程序保持一致，你改完直接复制给我即可。</p>

        <h2>布局参数</h2>
        <div class="grid">
          <label>
            <span class="field-name">眼睛中心 Y</span>
            <span class="field-code">layout.eyeY</span>
            <input id="layout-eyeY" type="number" min="8" max="40" value="24">
          </label>
          <label>
            <span class="field-name">双眼间距</span>
            <span class="field-code">layout.eyeSpacing</span>
            <input id="layout-eyeSpacing" type="number" min="4" max="24" value="14">
          </label>
          <label>
            <span class="field-name">基础眼宽</span>
            <span class="field-code">layout.eyeWidth</span>
            <input id="layout-eyeWidth" type="number" min="8" max="24" value="16">
          </label>
          <label>
            <span class="field-name">基础眼高</span>
            <span class="field-code">layout.eyeHeight</span>
            <input id="layout-eyeHeight" type="number" min="4" max="18" value="10">
          </label>
          <label>
            <span class="field-name">时间起始 Y</span>
            <span class="field-code">layout.timeY</span>
            <input id="layout-timeY" type="number" min="0" max="20" value="2">
          </label>
        </div>

        <h2>行为参数</h2>
        <div class="grid">
          <label>
            <span class="field-name">眨眼间隔（毫秒）</span>
            <span class="field-code">behavior.blinkIntervalMs</span>
            <input id="behavior-blinkIntervalMs" type="number" min="500" max="10000" step="100" value="3200">
          </label>
          <label>
            <span class="field-name">游走间隔（毫秒）</span>
            <span class="field-code">behavior.lookIntervalMs</span>
            <input id="behavior-lookIntervalMs" type="number" min="500" max="10000" step="100" value="4200">
          </label>
          <label>
            <span class="field-name">闲置偏移幅度</span>
            <span class="field-code">behavior.idleMove</span>
            <input id="behavior-idleMove" type="number" min="0" max="6" value="2">
          </label>
          <label>
            <span class="field-name">多久进入困倦（毫秒）</span>
            <span class="field-code">behavior.sleepyAfterMs</span>
            <input id="behavior-sleepyAfterMs" type="number" min="2000" max="120000" step="500" value="45000">
          </label>
        </div>

        <h2>交互参数</h2>
        <div class="grid">
          <label>
            <span class="field-name">看向保持时长（毫秒）</span>
            <span class="field-code">interaction.lookHoldMs</span>
            <input id="interaction-lookHoldMs" type="number" min="200" max="5000" step="100" value="1200">
          </label>
          <label>
            <span class="field-name">表情保持时长（毫秒）</span>
            <span class="field-code">interaction.moodHoldMs</span>
            <input id="interaction-moodHoldMs" type="number" min="200" max="5000" step="100" value="1800">
          </label>
        </div>

        <h2>时间参数</h2>
        <div class="grid">
          <label class="checkbox">
            <span><input id="time-show" type="checkbox" checked>显示时间</span>
          </label>
          <label class="checkbox">
            <span><input id="time-showSeconds" type="checkbox">显示秒</span>
          </label>
        </div>

        <h2>颜色参数</h2>
        <div class="grid">
          <label>
            <span class="field-name">眼睛主色</span>
            <span class="field-code">style.eyeColor</span>
            <input id="style-eyeColor" type="color" value="#9bdcff">
          </label>
          <label>
            <span class="field-name">时间颜色</span>
            <span class="field-code">style.timeColor</span>
            <input id="style-timeColor" type="color" value="#d8f3ff">
          </label>
        </div>
      </section>

      <section class="panel json-box">
        <h2>JSON 配置</h2>
        <textarea id="json-output" spellcheck="false"></textarea>
        <div class="buttons">
          <button id="copy-json">复制 JSON</button>
          <button id="apply-json" class="secondary">从 JSON 应用</button>
        </div>
        <p class="foot">发送给设备时仍然使用 <code>{"cmd":"set_eyes_config","config":...}</code>，这里只改中文说明，不改字段名。</p>
      </section>
    </section>

    <section class="column">
      <section class="panel preview-panel">
        <div class="preview-wrap">
          <canvas id="preview" width="64" height="64"></canvas>
          <div class="status">
            <span class="chip">当前表情：<span id="expression-status">正常</span></span>
            <span class="chip">当前时段：<span id="time-status">上午</span></span>
            <span class="chip">时间字形：5×3 像素字</span>
          </div>
        </div>
      </section>
    </section>

    <aside class="column">
      <section class="panel">
        <h2>眼神切换</h2>
        <p class="desc">这里是当前项目整理后的 21 个眼神，点击后会按眨眼过渡切过去。</p>
        <div id="expression-list" class="expression-grid"></div>
      </section>

      <section class="panel">
        <h2>互动测试</h2>
        <div class="buttons">
          <button data-action="blink">眨眼</button>
          <button data-action="look_left">看左边</button>
          <button data-action="look_right">看右边</button>
          <button data-action="look_center">看中间</button>
          <button data-action="happy">开心</button>
          <button data-action="sleepy">困倦</button>
        </div>
      </section>
    </aside>
  </div>

  <script>
    const canvas = document.getElementById("preview");
    const ctx = canvas.getContext("2d");
    const jsonOutput = document.getElementById("json-output");
    const expressionStatus = document.getElementById("expression-status");
    const timeStatus = document.getElementById("time-status");
    const expressionList = document.getElementById("expression-list");

    const REFERENCE_EYE_SIZE = 20;
    const BLINK_DURATION_MS = 150;

    const FONT_3X5 = {

    const EXPRESSIONS = {

    const EXPRESSION_ORDER = [
      "Normal",
      "Angry",
      "Glee",
      "Happy",
      "Sad",
      "Worried",
      "Focused",
      "Annoyed",
      "Surprised",
      "Skeptic",
      "Frustrated",
      "Unimpressed",
      "Sleepy",
      "Suspicious",
      "Squint",
      "Furious",
      "Scared",

    ];

    const PRESETS = {
      Normal: { offsetX: 0, offsetY: 0, height: 20, width: 20, slopeTop: 0, slopeBottom: 0, radiusTop: 4, radiusBottom: 4 },
      Angry: { offsetX: -2, offsetY: 0, height: 10, width: 20, slopeTop: 0.3, slopeBottom: 0, radiusTop: 1, radiusBottom: 6 },
      Glee: { offsetX: 0, offsetY: 0, height: 4, width: 20, slopeTop: 0, slopeBottom: 0, radiusTop: 4, radiusBottom: 0 },
      Happy: { offsetX: 0, offsetY: 0, height: 5, width: 20, slopeTop: 0, slopeBottom: 0, radiusTop: 5, radiusBottom: 0 },
      Sad: { offsetX: 0, offsetY: 0, height: 8, width: 20, slopeTop: -0.5, slopeBottom: 0, radiusTop: 1, radiusBottom: 5 },
      Worried: { offsetX: 0, offsetY: 0, height: 13, width: 20, slopeTop: -0.1, slopeBottom: 0, radiusTop: 3, radiusBottom: 5 },
      Focused: { offsetX: 0, offsetY: 0, height: 7, width: 20, slopeTop: 0.2, slopeBottom: 0, radiusTop: 2, radiusBottom: 1 },
      Annoyed: { offsetX: 0, offsetY: 0, height: 6, width: 20, slopeTop: 0, slopeBottom: 0, radiusTop: 0, radiusBottom: 5 },
      Surprised: { offsetX: -1, offsetY: 0, height: 23, width: 23, slopeTop: 0, slopeBottom: 0, radiusTop: 8, radiusBottom: 8 },
      Skeptic: { offsetX: 0, offsetY: -3, height: 13, width: 20, slopeTop: 0.3, slopeBottom: 0, radiusTop: 1, radiusBottom: 5 },
      Frustrated: { offsetX: 2, offsetY: -3, height: 6, width: 20, slopeTop: 0, slopeBottom: 0, radiusTop: 0, radiusBottom: 5 },
      Unimpressed: { offsetX: 2, offsetY: 0, height: 6, width: 20, slopeTop: 0, slopeBottom: 0, radiusTop: 1, radiusBottom: 5 },
      Sleepy: { offsetX: 0, offsetY: -1, height: 7, width: 20, slopeTop: -0.5, slopeBottom: -0.5, radiusTop: 2, radiusBottom: 2 },
      Suspicious: { offsetX: 0, offsetY: 0, height: 11, width: 20, slopeTop: 0, slopeBottom: 0, radiusTop: 4, radiusBottom: 2 },
      Squint: { offsetX: 3, offsetY: 0, height: 10, width: 10, slopeTop: 0, slopeBottom: 0, radiusTop: 3, radiusBottom: 3 },
      Furious: { offsetX: -1, offsetY: 0, height: 15, width: 20, slopeTop: 0.4, slopeBottom: 0, radiusTop: 1, radiusBottom: 4 },
      Scared: { offsetX: -2, offsetY: 0, height: 20, width: 20, slopeTop: -0.1, slopeBottom: 0, radiusTop: 6, radiusBottom: 4 },
      Awe: { offsetX: 1, offsetY: 0, height: 18, width: 23, slopeTop: -0.1, slopeBottom: 0.1, radiusTop: 6, radiusBottom: 6 },
      Excited: { offsetX: 0, offsetY: -2, height: 24, width: 22, slopeTop: 0.05, slopeBottom: -0.05, radiusTop: 7, radiusBottom: 7 },
      Determined: { offsetX: 0, offsetY: 0, height: 15, width: 20, slopeTop: 0.3, slopeBottom: 0, radiusTop: 2, radiusBottom: 2 },
      Confused: { offsetX: 0, offsetY: 0, height: 18, width: 20, slopeTop: -0.25, slopeBottom: 0.15, radiusTop: 5, radiusBottom: 5 }
    };

    const runtime = {
      lookX: 0,
      lookY: 0,
      targetLookX: 0,
      targetLookY: 0,
      leftLookOffsetX: 0,
      leftLookOffsetY: 0,
      rightLookOffsetX: 0,
      rightLookOffsetY: 0,
      targetLeftLookOffsetX: 0,
      targetLeftLookOffsetY: 0,
      targetRightLookOffsetX: 0,
      targetRightLookOffsetY: 0,
      blinkActive: false,
      transitionActive: false,
      transitionApplied: false,
      blinkStartAt: 0,
      leftBlinkDelayMs: 0,
      rightBlinkDelayMs: 0,
      leftBlinkScale: 1,
      rightBlinkScale: 1,
      nextBlinkAfterMs: 0,
      lastBlinkAt: performance.now(),
      nextLookAfterMs: 0,
      lastLookAt: performance.now(),
      lastExpressionAt: performance.now(),
      lastInteractionAt: performance.now(),
      actionExpireAt: 0,
      expression: "Normal",
      pendingExpression: "Normal",
      history: ["Normal"]
    };

    function getConfig() {
      return {
        layout: {
          eyeY: Number(document.getElementById("layout-eyeY").value),
          eyeSpacing: Number(document.getElementById("layout-eyeSpacing").value),
          eyeWidth: Number(document.getElementById("layout-eyeWidth").value),
          eyeHeight: Number(document.getElementById("layout-eyeHeight").value),
          timeY: Number(document.getElementById("layout-timeY").value)
        },
        behavior: {
          blinkIntervalMs: Number(document.getElementById("behavior-blinkIntervalMs").value),
          lookIntervalMs: Number(document.getElementById("behavior-lookIntervalMs").value),
          idleMove: Number(document.getElementById("behavior-idleMove").value),
          sleepyAfterMs: Number(document.getElementById("behavior-sleepyAfterMs").value)
        },
        interaction: {
          lookHoldMs: Number(document.getElementById("interaction-lookHoldMs").value),
          moodHoldMs: Number(document.getElementById("interaction-moodHoldMs").value)
        },
        time: {
          show: document.getElementById("time-show").checked,
          showSeconds: document.getElementById("time-showSeconds").checked
        },
        style: {
          eyeColor: document.getElementById("style-eyeColor").value,
          timeColor: document.getElementById("style-timeColor").value
        }
      };
    }

    function applyConfig(config) {
      document.getElementById("layout-eyeY").value = config.layout.eyeY;
      document.getElementById("layout-eyeSpacing").value = config.layout.eyeSpacing;
      document.getElementById("layout-eyeWidth").value = config.layout.eyeWidth;
      document.getElementById("layout-eyeHeight").value = config.layout.eyeHeight;
      document.getElementById("layout-timeY").value = config.layout.timeY;
      document.getElementById("behavior-blinkIntervalMs").value = config.behavior.blinkIntervalMs;
      document.getElementById("behavior-lookIntervalMs").value = config.behavior.lookIntervalMs;
      document.getElementById("behavior-idleMove").value = config.behavior.idleMove;
      document.getElementById("behavior-sleepyAfterMs").value = config.behavior.sleepyAfterMs;
      document.getElementById("interaction-lookHoldMs").value = config.interaction.lookHoldMs;
      document.getElementById("interaction-moodHoldMs").value = config.interaction.moodHoldMs;
      document.getElementById("time-show").checked = config.time.show;
      document.getElementById("time-showSeconds").checked = config.time.showSeconds;
      document.getElementById("style-eyeColor").value = config.style.eyeColor;
      document.getElementById("style-timeColor").value = config.style.timeColor;
    }

    function exportJson() {
      jsonOutput.value = JSON.stringify(getConfig(), null, 2);
    }

    function clamp(value, minValue, maxValue) {
      return Math.max(minValue, Math.min(maxValue, value));
    }

    function randomFloat(minValue, maxValue) {
      return minValue + Math.random() * (maxValue - minValue);
    }

    function jitteredInterval(baseMs, minPercent, maxPercent) {
      const percent = randomFloat(minPercent, maxPercent);
      return baseMs * percent / 100;
    }

    function pointInRectangle(px, py, x0, y0, x1, y1) {
      const l = Math.min(x0, x1);
      const r = Math.max(x0, x1);
      const t = Math.min(y0, y1);
      const b = Math.max(y0, y1);
      return px >= l && px <= r && py >= t && py <= b;
    }

    function triangleSign(px, py, ax, ay, bx, by) {
      return (px - bx) * (ay - by) - (ax - bx) * (py - by);
    }

    function pointInTriangle(px, py, ax, ay, bx, by, cx, cy) {
      const b1 = triangleSign(px, py, ax, ay, bx, by) < 0;
      const b2 = triangleSign(px, py, bx, by, cx, cy) < 0;
      const b3 = triangleSign(px, py, cx, cy, ax, ay) < 0;
      return b1 === b2 && b2 === b3;
    }

    function pointInQuarterEllipse(px, py, cx, cy, rx, ry, leftSide, topSide) {
      if (rx <= 0 || ry <= 0) {
        return false;
      }
      if (leftSide && px > cx) {
        return false;
      }
      if (!leftSide && px < cx) {
        return false;
      }
      if (topSide && py > cy) {
        return false;
      }
      if (!topSide && py < cy) {
        return false;
      }
      const dx = (px - cx) / rx;
      const dy = (py - cy) / ry;
      return dx * dx + dy * dy <= 1;
    }

    function getTimePeriod(now) {
      const hour = now.getHours();
      if (hour >= 23 || hour < 6) return "深夜";
      if (hour < 9) return "清晨";
      if (hour < 12) return "上午";
      if (hour < 14) return "中午";
      if (hour < 18) return "下午";
      if (hour < 21) return "傍晚";
      return "晚上";
    }

    function getMinExpressionInterval() {
      const period = getTimePeriod(new Date());
      if (period === "深夜") return 8000;
      if (period === "清晨") return 6000;
      if (period === "上午") return 4000;
      if (period === "中午") return 6000;
      if (period === "下午") return 4000;
      if (period === "傍晚") return 5000;
      return 6000;
    }

    function fillTimeWeights() {
      const period = getTimePeriod(new Date());
      const weights = {};
      EXPRESSION_ORDER.forEach((expression) => {
        weights[expression] = 0;
      });

      if (period === "深夜") {
        weights.Sleepy = 50;
        weights.Worried = 20;
        weights.Sad = 15;
        weights.Normal = 10;
        weights.Squint = 5;
      } else if (period === "清晨") {
        weights.Sleepy = 40;
        weights.Normal = 30;
        weights.Worried = 15;
        weights.Squint = 10;
        weights.Unimpressed = 5;
      } else if (period === "上午") {
        weights.Normal = 30;
        weights.Focused = 25;
        weights.Happy = 15;
        weights.Determined = 15;
        weights.Excited = 10;
        weights.Glee = 5;
      } else if (period === "中午") {
        weights.Sleepy = 30;
        weights.Normal = 25;
        weights.Unimpressed = 20;
        weights.Squint = 15;
        weights.Frustrated = 10;
        weights.Confused = 8;
      } else if (period === "下午") {
        weights.Focused = 30;
        weights.Normal = 25;
        weights.Determined = 20;
        weights.Annoyed = 10;
        weights.Skeptic = 10;
        weights.Happy = 5;
        weights.Confused = 6;
      } else if (period === "傍晚") {
        weights.Happy = 25;
        weights.Normal = 25;
        weights.Glee = 20;
        weights.Excited = 15;
        weights.Surprised = 10;
        weights.Awe = 5;
      } else {
        weights.Sleepy = 35;
        weights.Normal = 20;
        weights.Unimpressed = 20;
        weights.Worried = 15;
        weights.Sad = 10;
        weights.Confused = 7;
      }

      return weights;
    }

    function applyTransitionWeights(weights) {
      const transitions = {
        Normal: { Normal: 20, Happy: 20, Focused: 20, Surprised: 15, Skeptic: 15, Determined: 10 },
        Happy: { Happy: 20, Glee: 25, Excited: 20, Normal: 15, Surprised: 10 },
        Angry: { Angry: 20, Furious: 25, Annoyed: 20, Frustrated: 20, Normal: 10 },
        Sleepy: { Sleepy: 30, Squint: 25, Unimpressed: 20, Worried: 15, Normal: 10 },
        Focused: { Focused: 25, Determined: 25, Normal: 20, Skeptic: 15, Annoyed: 10 },
        Sad: { Sad: 25, Worried: 25, Frustrated: 20, Normal: 15, Unimpressed: 10 },
        Excited: { Excited: 20, Happy: 25, Surprised: 20, Glee: 20, Normal: 10 },
        Surprised: { Surprised: 15, Awe: 25, Scared: 20, Excited: 15, Normal: 15, Happy: 10 },
        Confused: { Confused: 20, Skeptic: 22, Worried: 18, Normal: 15, Focused: 12, Surprised: 13 }
      };

      const current = transitions[runtime.expression];
      if (!current) {
        return;
      }

      Object.entries(current).forEach(([expression, weight]) => {
        const timeWeight = weights[expression];
        weights[expression] = timeWeight * 0.6 + weight * 0.4;
      });
    }

    function pushHistory(expression) {
      runtime.history.push(expression);
      if (runtime.history.length > 5) {
        runtime.history.shift();
      }
    }

    function chooseNextExpression() {
      const weights = fillTimeWeights();
      applyTransitionWeights(weights);

      weights[runtime.expression] *= 0.3;

      const recent = runtime.history.slice(-3);
      recent.forEach((expression) => {
        weights[expression] *= 0.2;
      });

      const total = EXPRESSION_ORDER.reduce((sum, expression) => sum + weights[expression], 0);
      if (total <= 0) {
        return runtime.expression;
      }

      let roll = Math.random() * total;
      for (const expression of EXPRESSION_ORDER) {
        roll -= weights[expression];
        if (roll <= 0) {
          return expression;
        }
      }

      return runtime.expression;
    }

    function buildRasterEyeShape(centerX, centerY, preset, config, blinkAmount) {
      const scaleX = config.layout.eyeWidth / REFERENCE_EYE_SIZE;
      const scaleY = config.layout.eyeHeight / REFERENCE_EYE_SIZE;
      const radiusScale = Math.min(scaleX, scaleY);
      const shape = {
        centerX,
        centerY,
        offsetX: preset.offsetX * scaleX,
        offsetY: preset.offsetY * scaleY,
        width: preset.width * scaleX,
        height: preset.height * scaleY,
        slopeTop: preset.slopeTop,
        slopeBottom: preset.slopeBottom,
        radiusTop: preset.radiusTop * radiusScale,
        radiusBottom: preset.radiusBottom * radiusScale
      };

      const blinkScale = 1 - blinkAmount;
      shape.height = clamp(shape.height * blinkScale, 1, 64);
      shape.deltaTop = (shape.height * shape.slopeTop) / 2;
      shape.deltaBottom = (shape.height * shape.slopeBottom) / 2;

      const totalHeight = shape.height + shape.deltaTop - shape.deltaBottom;
      if (totalHeight <= 1) {
        shape.radiusTop = 0;
        shape.radiusBottom = 0;
      } else if (shape.radiusBottom > 0 && shape.radiusTop > 0 && totalHeight - 1 < shape.radiusBottom + shape.radiusTop) {
        const scaleDown = (totalHeight - 1) / (shape.radiusBottom + shape.radiusTop);
        shape.radiusTop *= scaleDown;
        shape.radiusBottom *= scaleDown;
      }

      shape.TLcY = centerY + shape.offsetY - shape.height / 2 + shape.radiusTop - shape.deltaTop;
      shape.TLcX = centerX + shape.offsetX - shape.width / 2 + shape.radiusTop;
      shape.TRcY = centerY + shape.offsetY - shape.height / 2 + shape.radiusTop + shape.deltaTop;
      shape.TRcX = centerX + shape.offsetX + shape.width / 2 - shape.radiusTop;
      shape.BLcY = centerY + shape.offsetY + shape.height / 2 - shape.radiusBottom - shape.deltaBottom;
      shape.BLcX = centerX + shape.offsetX - shape.width / 2 + shape.radiusBottom;
      shape.BRcY = centerY + shape.offsetY + shape.height / 2 - shape.radiusBottom + shape.deltaBottom;
      shape.BRcX = centerX + shape.offsetX + shape.width / 2 - shape.radiusBottom;

      shape.minCX = Math.min(shape.TLcX, shape.BLcX);
      shape.maxCX = Math.max(shape.TRcX, shape.BRcX);
      shape.minCY = Math.min(shape.TLcY, shape.TRcY);
      shape.maxCY = Math.max(shape.BLcY, shape.BRcY);

      shape.minX = centerX + shape.offsetX - shape.width / 2;
      shape.maxX = centerX + shape.offsetX + shape.width / 2;
      shape.minY = Math.min(shape.TLcY - shape.radiusTop, shape.TRcY - shape.radiusTop);
      shape.maxY = Math.max(shape.BLcY + shape.radiusBottom, shape.BRcY + shape.radiusBottom);
      return shape;
    }

    function presetForEye(expression, isLeftEye) {
      const preset = { ...PRESETS[expression] };
      if (!isLeftEye) {
        return preset;
      }

      if (expression === "Worried") {
        preset.offsetY -= 1.5;
        preset.height += 3;
        preset.slopeTop -= 0.08;
      } else if (expression === "Annoyed") {
        preset.offsetY -= 2;
        preset.height += 4;
        preset.radiusBottom += 1.5;
      } else if (expression === "Skeptic") {
        preset.offsetY -= 1.5;
        preset.height += 2.5;
        preset.slopeTop += 0.05;
      } else if (expression === "Unimpressed") {
        preset.offsetY -= 2;
        preset.height += 5.5;
        preset.radiusBottom += 1.5;
      } else if (expression === "Sleepy") {
        preset.height -= 1.5;
        preset.offsetY -= 0.4;
      } else if (expression === "Suspicious") {
        preset.offsetY -= 1.8;
        preset.height += 2;
        preset.slopeTop += 0.12;
      } else if (expression === "Squint") {
        preset.offsetX = 1.2;
        preset.offsetY = -0.5;
        preset.width += 5;
        preset.height += 6;
      } else if (expression === "Confused") {
        preset.offsetY -= 1.4;
        preset.height += 2.8;
        preset.slopeTop -= 0.08;
        preset.slopeBottom += 0.04;
      }

      return preset;
    }

    function buildLookTransform(config, isLeftEye) {
      const lookX = runtime.lookX + (isLeftEye ? runtime.leftLookOffsetX : runtime.rightLookOffsetX);
      const lookY = runtime.lookY + (isLeftEye ? runtime.leftLookOffsetY : runtime.rightLookOffsetY);
      const normalizedX = clamp(lookX, -1, 1);
      const normalizedY = clamp(lookY, -1, 1);
      const lookSquash = 1 - Math.abs(normalizedY) * 0.18;
      const sideBias = isLeftEye ? (1 + normalizedX * 0.16) : (1 - normalizedX * 0.16);
      return {
        moveX: -config.behavior.idleMove * 0.85 * normalizedX,
        moveY: config.behavior.idleMove * 0.65 * normalizedY,
        scaleX: 1,
        scaleY: clamp(lookSquash * sideBias, 0.72, 1.22)
      };
    }

    function normalizedLoopPhase(now, periodMs, phaseOffset) {
      if (!periodMs) {
        return 0;
      }
      let phase = (now % periodMs) / periodMs + phaseOffset;
      phase = phase - Math.floor(phase);
      return phase;
    }

    function trianglePulse(now, periodMs, phaseOffset) {
      const phase = normalizedLoopPhase(now, periodMs, phaseOffset);
      if (phase < 0.5) {
        return phase * 2;
      }
      return (1 - phase) * 2;
    }

    function signedTrianglePulse(now, periodMs, phaseOffset) {
      return trianglePulse(now, periodMs, phaseOffset) * 2 - 1;
    }

    function applyShapeDelta(preset, delta, factor) {
      preset.offsetX += delta.offsetX * factor;
      preset.offsetY += delta.offsetY * factor;
      preset.height += delta.height * factor;
      preset.width += delta.width * factor;
      preset.slopeTop += delta.slopeTop * factor;
      preset.slopeBottom += delta.slopeBottom * factor;
      preset.radiusTop += delta.radiusTop * factor;
      preset.radiusBottom += delta.radiusBottom * factor;
    }

    function configureVariationLayers(expression, isLeftEye) {
      const empty = { delta: { offsetX: 0, offsetY: 0, height: 0, width: 0, slopeTop: 0, slopeBottom: 0, radiusTop: 0, radiusBottom: 0 }, periodMs: 0, phaseOffset: 0, bidirectional: false };
      const layerA = JSON.parse(JSON.stringify(empty));
      const layerB = JSON.parse(JSON.stringify(empty));

      if (expression === "Normal") {
        layerA.delta = { offsetX: 0, offsetY: 0, height: isLeftEye ? 2.4 : 1.6, width: isLeftEye ? 0.9 : 1.3, slopeTop: 0, slopeBottom: 0, radiusTop: 0, radiusBottom: 0 };
        layerA.periodMs = isLeftEye ? 1800 : 2200;
        layerA.phaseOffset = isLeftEye ? 0.10 : 0.62;
        layerA.bidirectional = true;
        layerB.delta = { offsetX: 0, offsetY: isLeftEye ? -0.6 : 0.4, height: 0.8, width: 0, slopeTop: isLeftEye ? -0.03 : 0.03, slopeBottom: 0, radiusTop: 0, radiusBottom: 0 };
        layerB.periodMs = isLeftEye ? 3100 : 2700;
        layerB.phaseOffset = isLeftEye ? 0.37 : 0.14;
      } else if (expression === "Worried") {
        layerA.delta = { offsetX: 0, offsetY: isLeftEye ? -0.8 : 0.6, height: isLeftEye ? 2.6 : 1.5, width: 0, slopeTop: isLeftEye ? -0.08 : 0.04, slopeBottom: 0, radiusTop: 0, radiusBottom: 0.5 };
        layerA.periodMs = isLeftEye ? 1450 : 1800;
        layerA.phaseOffset = isLeftEye ? 0.15 : 0.56;
      } else if (expression === "Skeptic") {
        layerA.delta = { offsetX: 0, offsetY: isLeftEye ? -0.7 : 0.2, height: isLeftEye ? 2.0 : 0.9, width: 0, slopeTop: isLeftEye ? 0.08 : -0.02, slopeBottom: 0, radiusTop: 0, radiusBottom: 0 };
        layerA.periodMs = isLeftEye ? 1600 : 2100;
        layerA.phaseOffset = isLeftEye ? 0.25 : 0.64;
        layerB.delta = { offsetX: isLeftEye ? 0.2 : -0.2, offsetY: 0, height: 0, width: 0.6, slopeTop: 0, slopeBottom: 0, radiusTop: 0, radiusBottom: 0 };
        layerB.periodMs = isLeftEye ? 2900 : 2500;
        layerB.phaseOffset = isLeftEye ? 0.48 : 0.08;
        layerB.bidirectional = true;
      } else if (expression === "Sleepy") {
        layerA.delta = { offsetX: 0, offsetY: isLeftEye ? -0.2 : 0.3, height: isLeftEye ? 1.1 : 0.7, width: 0, slopeTop: 0, slopeBottom: isLeftEye ? -0.06 : -0.03, radiusTop: 0, radiusBottom: 0 };
        layerA.periodMs = isLeftEye ? 2200 : 2600;
        layerA.phaseOffset = isLeftEye ? 0.12 : 0.58;
      } else if (expression === "Squint") {
        layerA.delta = { offsetX: isLeftEye ? 1.2 : -0.4, offsetY: isLeftEye ? 0.8 : 0.2, height: isLeftEye ? 2.4 : 0.9, width: isLeftEye ? 1.6 : 0.4, slopeTop: 0, slopeBottom: 0, radiusTop: 0, radiusBottom: 0 };
        layerA.periodMs = isLeftEye ? 1700 : 2300;
        layerA.phaseOffset = isLeftEye ? 0.05 : 0.66;
      } else if (expression === "Unimpressed") {
        layerA.delta = { offsetX: 0, offsetY: isLeftEye ? -0.5 : 0.2, height: isLeftEye ? 1.6 : 0.6, width: 0, slopeTop: 0, slopeBottom: 0, radiusTop: 0, radiusBottom: 0.6 };
        layerA.periodMs = isLeftEye ? 1550 : 2050;
        layerA.phaseOffset = isLeftEye ? 0.31 : 0.73;
      } else if (expression === "Confused") {
        layerA.delta = { offsetX: 0, offsetY: isLeftEye ? -0.7 : 0.3, height: isLeftEye ? 1.8 : 0.8, width: 0.4, slopeTop: isLeftEye ? -0.05 : 0.03, slopeBottom: isLeftEye ? 0.03 : -0.02, radiusTop: 0.2, radiusBottom: 0.2 };
        layerA.periodMs = isLeftEye ? 1900 : 2350;
        layerA.phaseOffset = isLeftEye ? 0.18 : 0.61;
        layerB.delta = { offsetX: isLeftEye ? 0.4 : -0.3, offsetY: 0, height: 0, width: isLeftEye ? 0.7 : 0.4, slopeTop: 0, slopeBottom: 0, radiusTop: 0, radiusBottom: 0 };
        layerB.periodMs = isLeftEye ? 3300 : 2800;
        layerB.phaseOffset = isLeftEye ? 0.49 : 0.12;
        layerB.bidirectional = true;
      } else if (expression === "Glee" || expression === "Happy") {
        layerA.delta = { offsetX: 0, offsetY: isLeftEye ? 0.7 : 0.4, height: isLeftEye ? 0.7 : 0.5, width: 0, slopeTop: 0, slopeBottom: 0, radiusTop: 0.4, radiusBottom: 0 };
        layerA.periodMs = isLeftEye ? 1250 : 1650;
        layerA.phaseOffset = isLeftEye ? 0.21 : 0.53;
      }

      return { layerA, layerB };
    }

    function applyVariationLayers(expression, isLeftEye, now, preset) {
      const nextPreset = { ...preset };
      const { layerA, layerB } = configureVariationLayers(expression, isLeftEye);

      if (layerA.periodMs > 0) {
        const factorA = layerA.bidirectional
          ? signedTrianglePulse(now, layerA.periodMs, layerA.phaseOffset)
          : trianglePulse(now, layerA.periodMs, layerA.phaseOffset);
        applyShapeDelta(nextPreset, layerA.delta, factorA);
      }

      if (layerB.periodMs > 0) {
        const factorB = layerB.bidirectional
          ? signedTrianglePulse(now, layerB.periodMs, layerB.phaseOffset)
          : trianglePulse(now, layerB.periodMs, layerB.phaseOffset);
        applyShapeDelta(nextPreset, layerB.delta, factorB);
      }

      nextPreset.height = clamp(nextPreset.height, 1, 32);
      nextPreset.width = clamp(nextPreset.width, 2, 32);
      nextPreset.radiusTop = clamp(nextPreset.radiusTop, 0, 16);
      nextPreset.radiusBottom = clamp(nextPreset.radiusBottom, 0, 16);
      return nextPreset;
    }

    function buildAnimatedPreset(centerX, centerY, preset, transform, config, blinkAmount) {
      const mergedPreset = {
        ...preset,
        offsetX: preset.offsetX + transform.moveX,
        offsetY: preset.offsetY - transform.moveY,
        width: preset.width * transform.scaleX,
        height: preset.height * transform.scaleY
      };
      return buildRasterEyeShape(centerX, centerY, mergedPreset, config, blinkAmount);
    }

    function containsShapePoint(shape, sampleX, sampleY) {
      if (pointInRectangle(sampleX, sampleY, shape.minCX, shape.minCY, shape.maxCX, shape.maxCY)) return true;
      if (pointInRectangle(sampleX, sampleY, shape.TRcX, shape.TRcY, shape.BRcX + shape.radiusBottom, shape.BRcY)) return true;
      if (pointInRectangle(sampleX, sampleY, shape.TLcX - shape.radiusTop, shape.TLcY, shape.BLcX, shape.BLcY)) return true;
      if (pointInRectangle(sampleX, sampleY, shape.TLcX, shape.TLcY - shape.radiusTop, shape.TRcX, shape.TRcY)) return true;
      if (pointInRectangle(sampleX, sampleY, shape.BLcX, shape.BLcY, shape.BRcX, shape.BRcY + shape.radiusBottom)) return true;

      if (shape.slopeTop > 0 &&
          pointInTriangle(sampleX, sampleY, shape.TLcX, shape.TLcY - shape.radiusTop, shape.TRcX, shape.TRcY - shape.radiusTop, shape.TRcX, shape.TLcY - shape.radiusTop)) {
        return true;
      }
      if (shape.slopeTop < 0 &&
          pointInTriangle(sampleX, sampleY, shape.TRcX, shape.TRcY - shape.radiusTop, shape.TLcX, shape.TLcY - shape.radiusTop, shape.TLcX, shape.TRcY - shape.radiusTop)) {
        return true;
      }
      if (shape.slopeBottom > 0 &&
          pointInTriangle(sampleX, sampleY, shape.BRcX + shape.radiusBottom, shape.BRcY + shape.radiusBottom, shape.BLcX - shape.radiusBottom, shape.BLcY + shape.radiusBottom, shape.BLcX - shape.radiusBottom, shape.BRcY + shape.radiusBottom)) {
        return true;
      }
      if (shape.slopeBottom < 0 &&
          pointInTriangle(sampleX, sampleY, shape.BLcX - shape.radiusBottom, shape.BLcY + shape.radiusBottom, shape.BRcX + shape.radiusBottom, shape.BRcY + shape.radiusBottom, shape.BRcX + shape.radiusBottom, shape.BLcY + shape.radiusBottom)) {
        return true;
      }

      if (shape.radiusTop > 0 && pointInQuarterEllipse(sampleX, sampleY, shape.TLcX, shape.TLcY, shape.radiusTop, shape.radiusTop, true, true)) return true;
      if (shape.radiusTop > 0 && pointInQuarterEllipse(sampleX, sampleY, shape.TRcX, shape.TRcY, shape.radiusTop, shape.radiusTop, false, true)) return true;
      if (shape.radiusBottom > 0 && pointInQuarterEllipse(sampleX, sampleY, shape.BLcX, shape.BLcY, shape.radiusBottom, shape.radiusBottom, true, false)) return true;
      if (shape.radiusBottom > 0 && pointInQuarterEllipse(sampleX, sampleY, shape.BRcX, shape.BRcY, shape.radiusBottom, shape.radiusBottom, false, false)) return true;

      return false;
    }

    function drawPixel(x, y, color) {
      ctx.fillStyle = color;
      ctx.fillRect(x, y, 1, 1);
    }

    function drawEye(centerX, centerY, config, expression, mirror, blinkAmount, now) {
      const preset = applyVariationLayers(expression, mirror, now, presetForEye(expression, mirror));
      const transform = buildLookTransform(config, mirror);
      const shape = buildAnimatedPreset(centerX, centerY, preset, transform, config, blinkAmount);
      const physicalMinX = mirror ? centerX * 2 - shape.maxX : shape.minX;
      const physicalMaxX = mirror ? centerX * 2 - shape.minX : shape.maxX;
      const startX = clamp(Math.floor(physicalMinX) - 1, 0, 63);
      const endX = clamp(Math.ceil(physicalMaxX) + 1, 0, 63);
      const startY = clamp(Math.floor(shape.minY) - 1, 0, 63);
      const endY = clamp(Math.ceil(shape.maxY) + 1, 0, 63);

      for (let y = startY; y <= endY; y++) {
        for (let x = startX; x <= endX; x++) {
          let sampleX = x + 0.5;
          const sampleY = y + 0.5;
          if (mirror) {
            sampleX = centerX * 2 - sampleX;
          }
          if (containsShapePoint(shape, sampleX, sampleY)) {
            drawPixel(x, y, config.style.eyeColor);
          }
        }
      }
    }

    function drawTinyText(text, y, color) {
      const glyphWidth = 3;
      const spacing = 1;
      const totalWidth = text.length * glyphWidth + Math.max(0, text.length - 1) * spacing;
      let cursorX = Math.floor((64 - totalWidth) / 2);

      for (const char of text) {
        const glyph = FONT_3X5[char];
        if (!glyph) {
          cursorX += glyphWidth + spacing;
          continue;
        }

        for (let row = 0; row < glyph.length; row++) {
          for (let col = 0; col < glyph[row].length; col++) {
            if (glyph[row][col] === "1") {
              drawPixel(cursorX + col, y + row, color);
            }
          }
        }

        cursorX += glyphWidth + spacing;
      }
    }

    function drawTime(config) {
      if (!config.time.show) {
        return;
      }

      const now = new Date();
      let text = now.toTimeString().slice(0, 5);
      if (config.time.showSeconds) {
        text = now.toTimeString().slice(0, 8);
      }
      drawTinyText(text, config.layout.timeY, config.style.timeColor);
    }

    function scheduleNextBlink(config) {
      runtime.nextBlinkAfterMs = jitteredInterval(config.behavior.blinkIntervalMs, 72, 138);
    }

    function scheduleNextLook(config) {
      runtime.nextLookAfterMs = jitteredInterval(config.behavior.lookIntervalMs, 68, 150);
    }

    function chooseIdleLook() {
      let amplitudeScale = 1;
      if (runtime.expression === "Sleepy" || runtime.expression === "Squint") {
        amplitudeScale = 0.72;
      } else if (runtime.expression === "Excited" || runtime.expression === "Surprised") {
        amplitudeScale = 1.08;
      }

      const roll = Math.random() * 100;
      let baseX = 0;
      let baseY = 0;

      if (roll < 28) {
        baseX = randomFloat(-0.18, 0.18);
        baseY = randomFloat(-0.10, 0.10);
      } else if (roll < 54) {
        const side = Math.random() < 0.5 ? -1 : 1;
        baseX = side * randomFloat(0.42, 0.80);
        baseY = randomFloat(-0.18, 0.20);
      } else if (roll < 72) {
        baseX = randomFloat(-0.36, 0.36);
        baseY = randomFloat(-0.62, -0.22);
      } else if (roll < 84) {
        baseX = randomFloat(-0.28, 0.28);
        baseY = randomFloat(0.12, 0.34);
      } else if (roll < 94) {
        const side = Math.random() < 0.5 ? -1 : 1;
        baseX = side * randomFloat(0.32, 0.64);
        baseY = Math.random() < 0.5 ? randomFloat(-0.42, -0.14) : randomFloat(0.08, 0.24);
      } else {
        const side = Math.random() < 0.5 ? -1 : 1;
        baseX = side * randomFloat(0.18, 0.30);
        baseY = randomFloat(-0.08, 0.08);
      }

      runtime.targetLookX = clamp(baseX * amplitudeScale, -0.90, 0.90);
      runtime.targetLookY = clamp(baseY * amplitudeScale, -0.82, 0.60);
      runtime.targetLeftLookOffsetX = 0;
      runtime.targetLeftLookOffsetY = 0;
      runtime.targetRightLookOffsetX = 0;
      runtime.targetRightLookOffsetY = 0;

      let asymmetryChance = 22;
      if (runtime.expression === "Confused" || runtime.expression === "Skeptic" || runtime.expression === "Worried") {
        asymmetryChance = 34;
      }

      if (Math.random() * 100 >= asymmetryChance) {
        return;
      }

      const microX = randomFloat(-0.10, 0.10);
      const microY = randomFloat(-0.05, 0.05);
      const lagFactor = randomFloat(0.28, 0.58);
      const leftLead = Math.random() < 0.5;

      if (leftLead) {
        runtime.targetLeftLookOffsetX = microX;
        runtime.targetLeftLookOffsetY = microY;
        runtime.targetRightLookOffsetX = microX * lagFactor;
        runtime.targetRightLookOffsetY = microY * lagFactor;
      } else {
        runtime.targetLeftLookOffsetX = microX * lagFactor;
        runtime.targetLeftLookOffsetY = microY * lagFactor;
        runtime.targetRightLookOffsetX = microX;
        runtime.targetRightLookOffsetY = microY;
      }

      if (Math.random() < 0.24) {
        const tiltY = randomFloat(-0.06, 0.06);
        if (leftLead) {
          runtime.targetLeftLookOffsetY += tiltY;
          runtime.targetRightLookOffsetY -= tiltY * 0.35;
        } else {
          runtime.targetLeftLookOffsetY -= tiltY * 0.35;
          runtime.targetRightLookOffsetY += tiltY;
        }
      }
    }

    function blinkAmountForEye(now, isLeftEye) {
      if (!runtime.blinkActive) {
        return 0;
      }

      const delay = isLeftEye ? runtime.leftBlinkDelayMs : runtime.rightBlinkDelayMs;
      const scale = isLeftEye ? runtime.leftBlinkScale : runtime.rightBlinkScale;
      if (now < runtime.blinkStartAt + delay) {
        return 0;
      }

      const phase = (now - runtime.blinkStartAt - delay) / BLINK_DURATION_MS;
      if (phase < 0.5) return clamp(phase * 2 * scale, 0, 1);
      if (phase < 1) return clamp((1 - (phase - 0.5) * 2) * scale, 0, 1);
      return 0;
    }

    function startBlink(now) {
      runtime.blinkActive = true;
      runtime.blinkStartAt = now;
      runtime.leftBlinkDelayMs = 0;
      runtime.rightBlinkDelayMs = 0;
      runtime.leftBlinkScale = 1;
      runtime.rightBlinkScale = 1;

      if (Math.random() < 0.42) {
        const skew = Math.floor(Math.random() * 37) - 18;
        if (skew > 0) {
          runtime.rightBlinkDelayMs = skew;
        } else if (skew < 0) {
          runtime.leftBlinkDelayMs = -skew;
        }
      }

      if (Math.random() < 0.35) {
        const baseScale = randomFloat(0.93, 1.0);
        runtime.leftBlinkScale = baseScale;
        runtime.rightBlinkScale = baseScale;

        if (Math.random() < 0.30) {
          const driftScale = randomFloat(0.96, 1.0);
          if (Math.random() < 0.5) {
            runtime.leftBlinkScale *= driftScale;
          } else {
            runtime.rightBlinkScale *= driftScale;
          }
        }
      }
    }

    function startExpressionTransition(expression, now) {
      if (expression === runtime.expression && !runtime.transitionActive) {
        return;
      }
      runtime.pendingExpression = expression;
      runtime.transitionActive = true;
      runtime.transitionApplied = false;
      startBlink(now);
    }

    function selectExpression(expression) {
      const now = performance.now();
      runtime.lastInteractionAt = now;
      runtime.lastExpressionAt = now;
      runtime.actionExpireAt = now + getConfig().interaction.moodHoldMs;
      startExpressionTransition(expression, now);
    }

    function interact(action) {
      const config = getConfig();
      const now = performance.now();
      runtime.lastInteractionAt = now;
      runtime.lastExpressionAt = now;

      if (action === "blink") {
        startBlink(now);
        return;
      }

      if (action === "look_left") {
        runtime.targetLookX = -1;
        runtime.targetLookY = 0;
        runtime.targetLeftLookOffsetX = 0;
        runtime.targetLeftLookOffsetY = 0;
        runtime.targetRightLookOffsetX = 0;
        runtime.targetRightLookOffsetY = 0;
        runtime.lastLookAt = now;
        scheduleNextLook(config);
        runtime.actionExpireAt = now + config.interaction.lookHoldMs;
        return;
      }

      if (action === "look_right") {
        runtime.targetLookX = 1;
        runtime.targetLookY = 0;
        runtime.targetLeftLookOffsetX = 0;
        runtime.targetLeftLookOffsetY = 0;
        runtime.targetRightLookOffsetX = 0;
        runtime.targetRightLookOffsetY = 0;
        runtime.lastLookAt = now;
        scheduleNextLook(config);
        runtime.actionExpireAt = now + config.interaction.lookHoldMs;
        return;
      }

      if (action === "look_center") {
        runtime.targetLookX = 0;
        runtime.targetLookY = 0;
        runtime.targetLeftLookOffsetX = 0;
        runtime.targetLeftLookOffsetY = 0;
        runtime.targetRightLookOffsetX = 0;
        runtime.targetRightLookOffsetY = 0;
        runtime.lastLookAt = now;
        scheduleNextLook(config);
        runtime.actionExpireAt = now + config.interaction.lookHoldMs;
        return;
      }

      if (action === "happy") {
        runtime.actionExpireAt = now + config.interaction.moodHoldMs;
        startExpressionTransition("Happy", now);
        return;
      }

      if (action === "sleepy") {
        runtime.actionExpireAt = now + config.interaction.moodHoldMs;
        startExpressionTransition("Sleepy", now);
      }
    }

    function updateBlink(now) {
      if (!runtime.blinkActive) {
        return;
      }

      const phase = (now - runtime.blinkStartAt) / BLINK_DURATION_MS;
      if (runtime.transitionActive && !runtime.transitionApplied && phase >= 0.5) {
        runtime.expression = runtime.pendingExpression;
        runtime.transitionApplied = true;
        runtime.lastExpressionAt = now;
        pushHistory(runtime.expression);
      }

      const totalBlinkMs = BLINK_DURATION_MS + Math.max(runtime.leftBlinkDelayMs, runtime.rightBlinkDelayMs);
      if (now - runtime.blinkStartAt >= totalBlinkMs) {
        runtime.blinkActive = false;
        runtime.lastBlinkAt = now;
        scheduleNextBlink(getConfig());
        runtime.transitionActive = false;
        runtime.transitionApplied = false;
      }
    }

    function updateRuntime(config, now) {
      if (runtime.nextBlinkAfterMs === 0) {
        scheduleNextBlink(config);
      }
      if (runtime.nextLookAfterMs === 0) {
        scheduleNextLook(config);
      }

      updateBlink(now);

      if (!runtime.blinkActive && now - runtime.lastBlinkAt >= runtime.nextBlinkAfterMs) {
        startBlink(now);
      }

      if (runtime.actionExpireAt > 0 && now >= runtime.actionExpireAt) {
        runtime.actionExpireAt = 0;
        runtime.targetLookX = 0;
        runtime.targetLookY = 0;
        runtime.targetLeftLookOffsetX = 0;
        runtime.targetLeftLookOffsetY = 0;
        runtime.targetRightLookOffsetX = 0;
        runtime.targetRightLookOffsetY = 0;
      }

      if (runtime.actionExpireAt === 0 && !runtime.transitionActive) {
        if (now - runtime.lastInteractionAt >= config.behavior.sleepyAfterMs) {
          if (runtime.expression !== "Sleepy") {
            startExpressionTransition("Sleepy", now);
          }
        } else if (now - runtime.lastExpressionAt >= getMinExpressionInterval()) {
          const nextExpression = chooseNextExpression();
          if (nextExpression !== runtime.expression) {
            startExpressionTransition(nextExpression, now);
          } else {
            runtime.lastExpressionAt = now;
          }
        }
      }

      if (now - runtime.lastLookAt >= runtime.nextLookAfterMs) {
        runtime.lastLookAt = now;
        if (runtime.actionExpireAt === 0) {
          chooseIdleLook();
          scheduleNextLook(config);
        }
      }

      const lookEase = runtime.actionExpireAt > 0 ? 0.16 : 0.08;
      runtime.lookX += (runtime.targetLookX - runtime.lookX) * lookEase;
      runtime.lookY += (runtime.targetLookY - runtime.lookY) * lookEase;
      runtime.leftLookOffsetX += (runtime.targetLeftLookOffsetX - runtime.leftLookOffsetX) * 0.12;
      runtime.leftLookOffsetY += (runtime.targetLeftLookOffsetY - runtime.leftLookOffsetY) * 0.12;
      runtime.rightLookOffsetX += (runtime.targetRightLookOffsetX - runtime.rightLookOffsetX) * 0.12;
      runtime.rightLookOffsetY += (runtime.targetRightLookOffsetY - runtime.rightLookOffsetY) * 0.12;
    }

    function renderExpressionButtons() {
      expressionList.innerHTML = EXPRESSION_ORDER.map((expression) => `
        <button class="expression-button" data-expression="${expression}">
          <span class="expression-cn">${EXPRESSIONS[expression]}</span>
          <span class="expression-en">${expression}</span>
        </button>
      `).join("");

      expressionList.querySelectorAll("[data-expression]").forEach((button) => {
        button.addEventListener("click", () => {
          selectExpression(button.dataset.expression);
        });
      });
    }

    function updateExpressionButtons() {
      expressionList.querySelectorAll("[data-expression]").forEach((button) => {
        const active = button.dataset.expression === runtime.expression ||
          (runtime.transitionActive && button.dataset.expression === runtime.pendingExpression);
        button.classList.toggle("active", active);
      });
    }

    function render(now) {
      const config = getConfig();
      updateRuntime(config, now);

      ctx.clearRect(0, 0, 64, 64);
      ctx.fillStyle = "#000000";
      ctx.fillRect(0, 0, 64, 64);

      const totalWidth = config.layout.eyeWidth * 2 + config.layout.eyeSpacing;
      const leftCenterX = (64 - totalWidth) / 2 + config.layout.eyeWidth / 2;
      const rightCenterX = leftCenterX + config.layout.eyeWidth + config.layout.eyeSpacing;
      const centerY = config.layout.eyeY;
      const leftBlinkAmount = blinkAmountForEye(now, true);
      const rightBlinkAmount = blinkAmountForEye(now, false);

      drawTime(config);
      drawEye(leftCenterX, centerY, config, runtime.expression, true, leftBlinkAmount, now);
      drawEye(rightCenterX, centerY, config, runtime.expression, false, rightBlinkAmount, now);

      expressionStatus.textContent = EXPRESSIONS[runtime.expression];
      timeStatus.textContent = getTimePeriod(new Date());
      updateExpressionButtons();
      exportJson();

      requestAnimationFrame(render);
    }

    document.querySelectorAll("input").forEach((input) => {
      input.addEventListener("input", exportJson);
    });

    document.querySelectorAll("button[data-action]").forEach((button) => {
      button.addEventListener("click", () => interact(button.dataset.action));
    });

    document.getElementById("copy-json").addEventListener("click", async () => {
      exportJson();
      await navigator.clipboard.writeText(jsonOutput.value);
    });

    document.getElementById("apply-json").addEventListener("click", () => {
      const parsed = JSON.parse(jsonOutput.value);
      applyConfig(parsed);
      exportJson();
    });

    renderExpressionButtons();
    exportJson();
    requestAnimationFrame(render);
  </script>
</body>
</html>
