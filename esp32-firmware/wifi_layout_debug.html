<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<title>WiFi 显示布局调试</title>
<style>
  body { background: #1a1a2e; color: #eee; font-family: monospace; display: flex; gap: 30px; padding: 20px; }
  canvas { border: 1px solid #444; image-rendering: pixelated; cursor: crosshair; }
  .panel { display: flex; flex-direction: column; gap: 10px; min-width: 280px; }
  .group { background: #16213e; padding: 12px; border-radius: 8px; }
  .group h3 { margin: 0 0 8px; font-size: 14px; color: #4F7FFF; }
  label { display: flex; justify-content: space-between; align-items: center; margin: 4px 0; font-size: 12px; }
  input[type=range] { width: 120px; }
  input[type=number] { width: 50px; background: #0f3460; border: 1px solid #555; color: #eee; padding: 2px 4px; }
  input[type=color] { width: 30px; height: 20px; border: none; cursor: pointer; }
  .val { color: #4F7FFF; min-width: 30px; text-align: right; }
  button { background: #4F7FFF; color: #fff; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; }
  button:hover { background: #3a6ae0; }
  #output { background: #0a0a1a; padding: 10px; border-radius: 6px; font-size: 11px; white-space: pre-wrap; max-height: 200px; overflow-y: auto; }
  .mode-tabs { display: flex; gap: 8px; margin-bottom: 10px; }
  .mode-tab { padding: 6px 14px; border-radius: 6px; cursor: pointer; background: #16213e; font-size: 12px; }
  .mode-tab.active { background: #4F7FFF; }
  .checkbox { display: flex; align-items: center; gap: 6px; }
</style>
</head><body>

<div>
  <div class="mode-tabs">
    <div class="mode-tab active" onclick="setMode('connected')">已连接</div>
    <div class="mode-tab" onclick="setMode('ap')">AP配网模式</div>
  </div>
  <canvas id="c" width="64" height="64"></canvas>
  <p style="font-size:11px;color:#888">鼠标位置: <span id="pos">-</span> | 像素比例: 8x</p>
</div>

<div class="panel">
  <div class="group">
    <h3>WiFi 图标</h3>
    <label>中心X <input type="range" id="wifiCx" min="10" max="54" value="32" oninput="draw()"> <span class="val" id="vWifiCx">32</span></label>
    <label>中心Y <input type="range" id="wifiCy" min="5" max="40" value="32" oninput="draw()"> <span class="val" id="vWifiCy">32</span></label>
    <label>最大半径 <input type="range" id="wifiR" min="8" max="28" value="23" oninput="draw()"> <span class="val" id="vWifiR">23</span></label>
    <label>弧线间距 <input type="range" id="wifiGap" min="3" max="8" value="8" oninput="draw()"> <span class="val" id="vWifiGap">8</span></label>
    <label>扇形宽度 <input type="range" id="wifiSpread" min="30" max="80" value="52" oninput="draw()"> <span class="val" id="vWifiSpread">52</span>°</label>
    <label>颜色 <input type="color" id="wifiColor" value="#3b82f6" oninput="draw()"></label>
  </div>

  <div class="group">
    <h3>状态徽章 (✓ / ✗)</h3>
    <label>偏移X <input type="range" id="badgeOx" min="-5" max="20" value="5" oninput="draw()"> <span class="val" id="vBadgeOx">5</span></label>
    <label>偏移Y <input type="range" id="badgeOy" min="-5" max="20" value="9" oninput="draw()"> <span class="val" id="vBadgeOy">9</span></label>
    <label>半径 <input type="range" id="badgeR" min="2" max="6" value="4" oninput="draw()"> <span class="val" id="vBadgeR">4</span></label>
  </div>

  <div class="group">
    <h3>IP 地址</h3>
    <label>Y位置 <input type="range" id="ipY" min="30" max="58" value="46" oninput="draw()"> <span class="val" id="vIpY">46</span></label>
    <label>颜色 <input type="color" id="ipColor" value="#969696" oninput="draw()"></label>
    <label>示例IP <input type="text" id="ipText" value="192.168.31.84" style="width:100px;background:#0f3460;border:1px solid #555;color:#eee" oninput="draw()"></label>
  </div>

  <div class="group" id="apGroup" style="display:none">
    <h3>AP 模式文字</h3>
    <label>SSID Y <input type="range" id="ssidY" min="25" max="50" value="36" oninput="draw()"> <span class="val" id="vSsidY">36</span></label>
    <label>密码 Y <input type="range" id="passY" min="30" max="55" value="46" oninput="draw()"> <span class="val" id="vPassY">46</span></label>
    <label>IP Y (AP) <input type="range" id="apIpY" min="40" max="60" value="55" oninput="draw()"> <span class="val" id="vApIpY">55</span></label>
  </div>

  <button onclick="exportCode()">导出 C++ 参数</button>
  <div id="output"></div>
</div>

<script>
const canvas = document.getElementById('c');
canvas.style.width = '512px'; canvas.style.height = '512px';
const ctx = canvas.getContext('2d');
let mode = 'connected';

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const x = Math.floor((e.clientX - rect.left) / (rect.width / 64));
  const y = Math.floor((e.clientY - rect.top) / (rect.height / 64));
  document.getElementById('pos').textContent = `${x}, ${y}`;
});

function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('apGroup').style.display = m === 'ap' ? 'block' : 'none';
  draw();
}

function v(id) { const el = document.getElementById(id); const val = parseInt(el.value); const vEl = document.getElementById('v' + id.charAt(0).toUpperCase() + id.slice(1)); if(vEl) vEl.textContent = val; return val; }
function hexToRgb(hex) { const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16); return [r,g,b]; }

function setPixel(x, y, r, g, b) {
  if (x < 0 || x >= 64 || y < 0 || y >= 64) return;
  ctx.fillStyle = `rgb(${r},${g},${b})`;
  ctx.fillRect(x, y, 1, 1);
}

function fillCircle(cx, cy, radius, r, g, b) {
  for (let dy = -radius; dy <= radius; dy++)
    for (let dx = -radius; dx <= radius; dx++)
      if (dx*dx + dy*dy <= radius*radius) setPixel(cx+dx, cy+dy, r, g, b);
}

// 画WiFi弧线，带圆头，spread 控制扇形角度（度）
function drawArc(cx, cy, radius, thickness, r, g, b, spreadDeg) {
  const minAngle = spreadDeg ? (90 - spreadDeg) * Math.PI / 180 : 0.3;
  for (let dy = -radius; dy <= 0; dy++) {
    for (let dx = -radius; dx <= radius; dx++) {
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist >= radius - thickness && dist <= radius) {
        const angle = Math.atan2(-dy, Math.abs(dx));
        if (angle > minAngle) setPixel(cx+dx, cy+dy, r, g, b);
      }
    }
  }
  // 两端圆头
  const midR = radius - thickness * 0.5;
  const capR = thickness * 0.5;
  for (let side = -1; side <= 1; side += 2) {
    const capCx = cx + side * midR * Math.cos(minAngle);
    const capCy = cy - midR * Math.sin(minAngle);
    for (let dy2 = -Math.ceil(capR); dy2 <= Math.ceil(capR); dy2++) {
      for (let dx2 = -Math.ceil(capR); dx2 <= Math.ceil(capR); dx2++) {
        if (Math.sqrt(dx2*dx2 + dy2*dy2) <= capR) {
          setPixel(Math.round(capCx+dx2), Math.round(capCy+dy2), r, g, b);
        }
      }
    }
  }
}

// 3x5 微型字体
const FONT3x5 = {
  '0':[7,5,5,5,7],'1':[2,6,2,2,7],'2':[7,1,7,4,7],'3':[7,1,7,1,7],'4':[5,5,7,1,1],
  '5':[7,4,7,1,7],'6':[7,4,7,5,7],'7':[7,1,1,1,1],'8':[7,5,7,5,7],'9':[7,5,7,1,7],
  '.':[0,0,0,0,2],':':[0,2,0,2,0],' ':[0,0,0,0,0],
  'A':[2,5,7,5,5],'B':[6,5,6,5,6],'C':[7,4,4,4,7],'D':[6,5,5,5,6],'E':[7,4,7,4,7],
  'F':[7,4,7,4,4],'G':[7,4,5,5,7],'H':[5,5,7,5,5],'I':[7,2,2,2,7],'K':[5,6,4,6,5],
  'L':[4,4,4,4,7],'M':[5,7,5,5,5],'N':[5,7,7,5,5],'O':[7,5,5,5,7],'P':[7,5,7,4,4],
  'R':[7,5,7,6,5],'S':[7,4,7,1,7],'T':[7,2,2,2,2],'U':[5,5,5,5,7],'W':[5,5,5,7,5],
  'X':[5,5,2,5,5],'Y':[5,5,2,2,2],'Z':[7,1,2,4,7],
  'a':[0,6,5,5,7],'b':[4,6,5,5,6],'c':[0,7,4,4,7],'d':[1,3,5,5,3],'e':[7,5,7,4,7],
  'f':[3,4,7,4,4],'g':[7,5,7,1,7],'h':[4,4,6,5,5],'i':[2,0,2,2,2],'k':[4,5,6,5,5],
  'l':[6,2,2,2,7],'m':[0,5,7,5,5],'n':[0,6,5,5,5],'o':[0,7,5,5,7],'p':[7,5,7,4,4],
  'r':[0,7,4,4,4],'s':[7,4,7,1,7],'t':[4,7,4,4,3],'u':[0,5,5,5,7],'w':[0,5,5,7,5],
  'x':[0,5,2,2,5],'y':[5,5,7,1,7],'-':[0,0,7,0,0],'_':[0,0,0,0,7],
};

function drawText(text, x, y, r, g, b) {
  let cx = x;
  for (const ch of text) {
    const glyph = FONT3x5[ch];
    if (!glyph) { cx += 4; continue; }
    for (let row = 0; row < 5; row++) {
      const bits = glyph[row];
      if (bits & 4) setPixel(cx, y+row, r, g, b);
      if (bits & 2) setPixel(cx+1, y+row, r, g, b);
      if (bits & 1) setPixel(cx+2, y+row, r, g, b);
    }
    cx += 4;
  }
  return cx - x; // 返回宽度
}

function textWidth(text) { return text.length * 4 - 1; }

function draw() {
  ctx.fillStyle = '#000'; ctx.fillRect(0, 0, 64, 64);
  // 画网格
  ctx.fillStyle = '#111';
  for (let i = 0; i < 64; i += 8) { for (let j = 0; j < 64; j++) { setPixel(i, j, 17, 17, 17); setPixel(j, i, 17, 17, 17); } }

  const wcx = v('wifiCx'), wcy = v('wifiCy'), wr = v('wifiR'), wgap = v('wifiGap'), wspread = v('wifiSpread');
  const [wr2, wg, wb] = hexToRgb(document.getElementById('wifiColor').value);
  const box = v('badgeOx'), boy = v('badgeOy'), br = v('badgeR');

  // WiFi弧线
  for (let i = 0; i < 3; i++) {
    const r = wr - i * wgap;
    if (r > 2) drawArc(wcx, wcy, r, 3, wr2, wg, wb, wspread);
  }
  // WiFi中心点
  fillCircle(wcx, wcy, 2, wr2, wg, wb);

  if (mode === 'connected') {
    // 绿色勾徽章
    const bx = wcx + box, by = wcy - (wr - wgap*2) + boy;
    fillCircle(bx, by, br, 34, 197, 94);
    // 画勾 ✓
    setPixel(bx-1, by, 255,255,255); setPixel(bx, by+1, 255,255,255); setPixel(bx+1, by-1, 255,255,255);

    // IP地址
    const iy = v('ipY');
    const [ir, ig, ib] = hexToRgb(document.getElementById('ipColor').value);
    const ipStr = document.getElementById('ipText').value;
    const tw = textWidth(ipStr);
    drawText(ipStr, Math.max(0, Math.floor((64 - tw) / 2)), iy, ir, ig, ib);
  } else {
    // AP模式
    const sy = v('ssidY'), py = v('passY'), aiy = v('apIpY');
    // 红色叉徽章
    const bx = wcx + box, by = wcy - (wr - wgap*2) + boy;
    fillCircle(bx, by, br, 239, 68, 68);
    setPixel(bx-1, by-1, 255,255,255); setPixel(bx+1, by+1, 255,255,255);
    setPixel(bx+1, by-1, 255,255,255); setPixel(bx-1, by+1, 255,255,255);

    const ssid = 'ESP32_AP';
    drawText(ssid, Math.floor((64 - textWidth(ssid))/2), sy, 200, 200, 200);
    const pass = '12345678';
    drawText(pass, Math.floor((64 - textWidth(pass))/2), py, 150, 150, 150);
    drawText('192.168.4.1', Math.floor((64 - textWidth('192.168.4.1'))/2), aiy, 150, 150, 150);
  }
}

function exportCode() {
  const o = document.getElementById('output');
  const wcx = v('wifiCx'), wcy = v('wifiCy'), wr = v('wifiR'), wgap = v('wifiGap');
  const box = v('badgeOx'), boy = v('badgeOy'), br = v('badgeR');
  const iy = v('ipY');
  const wspread = v('wifiSpread');
  const spreadRad = ((90 - wspread) * Math.PI / 180).toFixed(2);
  let code = `// === WiFi 布局参数 (自动生成) ===
#define WIFI_ICON_CX  ${wcx}
#define WIFI_ICON_CY  ${wcy}
#define WIFI_ARC_R    ${wr}
#define WIFI_ARC_GAP  ${wgap}
#define WIFI_SPREAD   ${spreadRad}f  // ${wspread}°
#define BADGE_OFFSET_X  ${box}
#define BADGE_OFFSET_Y  ${boy}
#define BADGE_RADIUS    ${br}
#define IP_TEXT_Y       ${iy}
`;
  if (mode === 'ap') {
    code += `#define AP_SSID_Y   ${v('ssidY')}
#define AP_PASS_Y   ${v('passY')}
#define AP_IP_Y     ${v('apIpY')}
`;
  }
  o.textContent = code;
}

draw();
</script>
</body></html>
