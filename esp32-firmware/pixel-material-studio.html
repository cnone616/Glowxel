<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>像素素材入库</title>
    <link rel="stylesheet" href="pixel-material-style.css" />
    <script src="gif-parser.js"></script>
  </head>
  <body>
    <h1>像素素材入库</h1>

    <div class="page">
      <div class="preview-panel">
        <div class="canvas-wrap">
          <canvas id="materialCanvas" width="640" height="640"></canvas>
        </div>
        <div class="preview-tip">
          这里只预览素材本身，不混入时间、日期、星期等参数。
        </div>
      </div>

      <div class="card control-panel">
        <div
          class="upload-area"
          id="uploadArea"
          onclick="document.getElementById('imageInput').click()"
        >
          <div id="uploadPlaceholder">
            <div class="upload-icon">📁</div>
            <div class="upload-text">点击上传图片或 GIF</div>
            <div class="upload-text upload-hint">建议素材尺寸接近 64x64</div>
          </div>
          <div id="imagePreviewContainer" style="display: none">
            <img id="imagePreview" class="image-preview" />
            <div class="image-actions">
              <button
                class="secondary"
                onclick="event.stopPropagation(); document.getElementById('imageInput').click();"
              >
                更换
              </button>
              <button
                class="secondary"
                onclick="event.stopPropagation(); removeMaterial();"
              >
                删除
              </button>
            </div>
          </div>
        </div>
        <input
          type="file"
          id="imageInput"
          accept="image/*,image/gif"
          style="display: none"
          onchange="handleImageUpload(event)"
        />

        <div id="gifControls" class="gif-controls" style="display: none">
          <div class="section-label">GIF 控制</div>
          <div class="control-group">
            <div class="gif-control-buttons">
              <button id="playBtn" onclick="playGif()">播放</button>
              <button id="pauseBtn" onclick="pauseGif()" style="display: none">
                暂停
              </button>
              <button onclick="stopGif()">停止</button>
            </div>
          </div>
          <div class="control-group">
            <label>播放速度</label>
            <div class="number-input-group">
              <button class="num-btn" onclick="adjustGifSpeed(-0.1)">-</button>
              <input
                type="number"
                id="gifSpeed"
                min="0.1"
                max="3"
                step="0.1"
                value="1"
                onchange="updateGifSpeed()"
              />
              <button class="num-btn" onclick="adjustGifSpeed(0.1)">+</button>
            </div>
          </div>
          <div class="frame-info">
            <span id="currentFrame">1</span> /
            <span id="totalFrames">1</span>
            <div class="frame-controls">
              <button onclick="prevFrame()">⏮️</button>
              <button onclick="nextFrame()">⏭️</button>
            </div>
          </div>
        </div>

        <div class="control-group">
          <label>素材名称</label>
          <input
            type="text"
            id="materialName"
            placeholder="输入素材名称"
          />
        </div>

        <div class="control-group">
          <div class="control-header">
            <label>尺寸设置</label>
            <button class="small secondary" onclick="setSquareSize()">
              长宽一致
            </button>
          </div>
        </div>

        <div class="control-grid">
          <div class="control-group">
            <label>宽度</label>
            <div class="number-input-group">
              <button class="num-btn" onclick="adjustValue('imageWidth', -1)">
                -
              </button>
              <input
                type="number"
                id="imageWidth"
                min="1"
                max="128"
                value="64"
                oninput="checkImageSize('width', this.value); updateDisplay();"
              />
              <button class="num-btn" onclick="adjustValue('imageWidth', 1)">
                +
              </button>
            </div>
            <div id="widthWarning" class="warning-text" style="display: none">
              宽度超过 64 可能显示不完整
            </div>
          </div>

          <div class="control-group">
            <label>高度</label>
            <div class="number-input-group">
              <button class="num-btn" onclick="adjustValue('imageHeight', -1)">
                -
              </button>
              <input
                type="number"
                id="imageHeight"
                min="1"
                max="128"
                value="64"
                oninput="checkImageSize('height', this.value); updateDisplay();"
              />
              <button class="num-btn" onclick="adjustValue('imageHeight', 1)">
                +
              </button>
            </div>
            <div id="heightWarning" class="warning-text" style="display: none">
              高度超过 64 可能显示不完整
            </div>
          </div>

          <div class="control-group">
            <label>X 位置</label>
            <div class="number-input-group">
              <button class="num-btn" onclick="adjustValue('imageX', -1)">-</button>
              <input
                type="number"
                id="imageX"
                min="-64"
                max="64"
                value="0"
                oninput="updateDisplay()"
              />
              <button class="num-btn" onclick="adjustValue('imageX', 1)">+</button>
            </div>
          </div>

          <div class="control-group">
            <label>Y 位置</label>
            <div class="number-input-group">
              <button class="num-btn" onclick="adjustValue('imageY', -1)">-</button>
              <input
                type="number"
                id="imageY"
                min="-64"
                max="64"
                value="0"
                oninput="updateDisplay()"
              />
              <button class="num-btn" onclick="adjustValue('imageY', 1)">+</button>
            </div>
          </div>
        </div>

        <button id="savePresetBtn" onclick="saveMaterialPreset()">
          保存当前素材到预设文件
        </button>

        <div id="statusOutput" class="status-output">请先上传图片或 GIF。</div>
      </div>

      <div class="card preset-panel">
        <div class="preset-header">
          <div class="section-label">已保存素材</div>
          <button class="small secondary" onclick="loadSavedMaterialPresets()">
            刷新列表
          </button>
        </div>
        <div id="savedPresetList" class="saved-preset-list"></div>
      </div>
    </div>

    <script src="pixel-material-script.js"></script>
  </body>
</html>
