<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<title>默认时钟布局调试</title>
<style>
  body { background: #1a1a2e; color: #eee; font-family: monospace; display: flex; gap: 30px; padding: 20px; }
  canvas { border: 1px solid #444; image-rendering: pixelated; cursor: crosshair; }
  .panel { display: flex; flex-direction: column; gap: 10px; min-width: 280px; }
  .group { background: #16213e; padding: 12px; border-radius: 8px; }
  .group h3 { margin: 0 0 8px; font-size: 14px; color: #4F7FFF; }
  label { display: flex; justify-content: space-between; align-items: center; margin: 4px 0; font-size: 12px; }
  input[type=range] { width: 120px; }
  input[type=color] { width: 30px; height: 20px; border: none; cursor: pointer; }
  .val { color: #4F7FFF; min-width: 30px; text-align: right; }
  .checkbox { display: flex; align-items: center; gap: 6px; font-size: 12px; }
  button { background: #4F7FFF; color: #fff; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; }
  button:hover { background: #3a6ae0; }
  #output { background: #0a0a1a; padding: 10px; border-radius: 6px; font-size: 11px; white-space: pre-wrap; max-height: 200px; overflow-y: auto; }
</style>
</head><body>

<div>
  <canvas id="c" width="64" height="64"></canvas>
  <p style="font-size:11px;color:#888">鼠标位置: <span id="pos">-</span> | 像素比例: 8x</p>
</div>

<div class="panel">
  <div class="group">
    <h3>Logo 九宫格</h3>
    <label>方块大小 <input type="range" id="logoBS" min="4" max="12" value="8" oninput="draw()"> <span class="val" id="vLogoBS">8</span></label>
    <label>间距 <input type="range" id="logoGap" min="1" max="4" value="2" oninput="draw()"> <span class="val" id="vLogoGap">2</span></label>
    <label>起始Y <input type="range" id="logoY" min="0" max="40" value="18" oninput="draw()"> <span class="val" id="vLogoY">18</span></label>
  </div>

  <div class="group">
    <h3>时间 (HH:MM)</h3>
    <label>X <input type="range" id="timeX" min="0" max="50" value="17" oninput="draw()"> <span class="val" id="vTimeX">17</span></label>
    <label>Y <input type="range" id="timeY" min="0" max="58" value="46" oninput="draw()"> <span class="val" id="vTimeY">46</span></label>
    <label>字号 <input type="range" id="timeFS" min="1" max="3" value="1" oninput="draw()"> <span class="val" id="vTimeFS">1</span></label>
    <label>颜色 <input type="color" id="timeColor" value="#64c8ff" oninput="draw()"></label>
  </div>

  <div class="group">
    <h3>日期 (MM-DD)</h3>
    <label class="checkbox"><input type="checkbox" id="dateShow" checked oninput="draw()"> 显示日期</label>
    <label>X <input type="range" id="dateX" min="0" max="50" value="17" oninput="draw()"> <span class="val" id="vDateX">17</span></label>
    <label>Y <input type="range" id="dateY" min="0" max="58" value="55" oninput="draw()"> <span class="val" id="vDateY">55</span></label>
    <label>字号 <input type="range" id="dateFS" min="1" max="3" value="1" oninput="draw()"> <span class="val" id="vDateFS">1</span></label>
    <label>颜色 <input type="color" id="dateColor" value="#787878" oninput="draw()"></label>
  </div>

  <div class="group">
    <h3>星期</h3>
    <label class="checkbox"><input type="checkbox" id="weekShow" oninput="draw()"> 显示星期</label>
    <label>X <input type="range" id="weekX" min="0" max="50" value="23" oninput="draw()"> <span class="val" id="vWeekX">23</span></label>
    <label>Y <input type="range" id="weekY" min="0" max="58" value="44" oninput="draw()"> <span class="val" id="vWeekY">44</span></label>
    <label>颜色 <input type="color" id="weekColor" value="#646464" oninput="draw()"></label>
  </div>

  <button onclick="exportCode()">导出 C++ 参数</button>
  <div id="output"></div>
</div>

<script>
const canvas = document.getElementById('c');
canvas.style.width = '512px'; canvas.style.height = '512px';
const ctx = canvas.getContext('2d');

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const x = Math.floor((e.clientX - rect.left) / (rect.width / 64));
  const y = Math.floor((e.clientY - rect.top) / (rect.height / 64));
  document.getElementById('pos').textContent = `${x}, ${y}`;
});

function v(id) { const el = document.getElementById(id); const val = parseInt(el.value); const vEl = document.getElementById('v' + id.charAt(0).toUpperCase() + id.slice(1)); if(vEl) vEl.textContent = val; return val; }
function hexToRgb(hex) { return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)]; }

function setPixel(x, y, r, g, b) {
  if (x < 0 || x >= 64 || y < 0 || y >= 64) return;
  ctx.fillStyle = `rgb(${r},${g},${b})`;
  ctx.fillRect(x, y, 1, 1);
}

function fillRect(x, y, w, h, r, g, b) {
  for (let dy = 0; dy < h; dy++)
    for (let dx = 0; dx < w; dx++)
      setPixel(x + dx, y + dy, r, g, b);
}

// Adafruit GFX 5x7 字体 (每字符5列，每列7bit，LSB在上)
const GFX_FONT = {
  '0':[0x3E,0x51,0x49,0x45,0x3E],'1':[0x00,0x42,0x7F,0x40,0x00],'2':[0x42,0x61,0x51,0x49,0x46],
  '3':[0x21,0x41,0x45,0x4B,0x31],'4':[0x18,0x14,0x12,0x7F,0x10],'5':[0x27,0x45,0x45,0x45,0x39],
  '6':[0x3C,0x4A,0x49,0x49,0x30],'7':[0x01,0x71,0x09,0x05,0x03],'8':[0x36,0x49,0x49,0x49,0x36],
  '9':[0x06,0x49,0x49,0x29,0x1E],':':[0x00,0x36,0x36,0x00,0x00],'-':[0x08,0x08,0x08,0x08,0x08],
  'S':[0x46,0x49,0x49,0x49,0x31],'u':[0x3C,0x40,0x40,0x20,0x7C],'n':[0x7C,0x04,0x04,0x04,0x78],
  'M':[0x7F,0x02,0x0C,0x02,0x7F],'o':[0x38,0x44,0x44,0x44,0x38],'T':[0x01,0x01,0x7F,0x01,0x01],
  'e':[0x38,0x54,0x54,0x54,0x18],'W':[0x7F,0x20,0x18,0x20,0x7F],'d':[0x38,0x44,0x44,0x48,0x7F],
  'h':[0x7F,0x08,0x04,0x04,0x78],'F':[0x7F,0x09,0x09,0x01,0x01],'r':[0x7C,0x08,0x04,0x04,0x08],
  'i':[0x00,0x44,0x7D,0x40,0x00],'a':[0x20,0x54,0x54,0x54,0x78],'t':[0x04,0x3F,0x44,0x40,0x20],
  ' ':[0x00,0x00,0x00,0x00,0x00]
};

// 用 GFX 字体画文字，和 Adafruit GFX 库一致
function drawGfxText(text, x, y, r, g, b, size) {
  let cx = x;
  for (const ch of text) {
    const cols = GFX_FONT[ch];
    if (!cols) { cx += 6 * size; continue; }
    for (let col = 0; col < 5; col++) {
      let bits = cols[col];
      for (let row = 0; row < 7; row++) {
        if (bits & (1 << row)) {
          for (let sy = 0; sy < size; sy++)
            for (let sx = 0; sx < size; sx++)
              setPixel(cx + col * size + sx, y + row * size + sy, r, g, b);
        }
      }
    }
    cx += 6 * size; // 5px字宽 + 1px间距，乘以缩放
  }
  return cx - x;
}

function gfxTextWidth(text, size) { return text.length * 6 * size - size; }

function draw() {
  ctx.fillStyle = '#000'; ctx.fillRect(0, 0, 64, 64);
  // 网格
  ctx.fillStyle = '#111';
  for (let i = 0; i < 64; i += 8) { for (let j = 0; j < 64; j++) { setPixel(i, j, 17, 17, 17); setPixel(j, i, 17, 17, 17); } }

  // Logo 九宫格
  const bs = v('logoBS'), lgap = v('logoGap'), ly = v('logoY');
  const step = bs + lgap;
  const totalW = bs * 3 + lgap * 2;
  const lx = Math.floor((64 - totalW) / 2);

  const orange = [249, 115, 22], blue = [59, 130, 246], pink = [236, 72, 153];
  const grid = [
    [orange, orange, blue],
    [orange, blue,   pink],
    [orange, orange, blue]
  ];
  for (let row = 0; row < 3; row++)
    for (let col = 0; col < 3; col++)
      fillRect(lx + col * step, ly + row * step, bs, bs, grid[row][col][0], grid[row][col][1], grid[row][col][2]);

  // 时间
  const tx = v('timeX'), ty = v('timeY'), tfs = v('timeFS');
  const [tr, tg, tb] = hexToRgb(document.getElementById('timeColor').value);
  drawGfxText('12:30', tx, ty, tr, tg, tb, tfs);

  // 日期
  if (document.getElementById('dateShow').checked) {
    const dx = v('dateX'), dy = v('dateY'), dfs = v('dateFS');
    const [dr, dg, db] = hexToRgb(document.getElementById('dateColor').value);
    drawGfxText('03-16', dx, dy, dr, dg, db, dfs);
  }

  // 星期
  if (document.getElementById('weekShow').checked) {
    const wx = v('weekX'), wy = v('weekY');
    const [wr, wg, wb] = hexToRgb(document.getElementById('weekColor').value);
    drawGfxText('Mon', wx, wy, wr, wg, wb, 1);
  }
}

function exportCode() {
  const o = document.getElementById('output');
  const bs = v('logoBS'), lgap = v('logoGap'), ly = v('logoY');
  const tx = v('timeX'), ty = v('timeY'), tfs = v('timeFS');
  const [tr, tg, tb] = hexToRgb(document.getElementById('timeColor').value);
  const dateShow = document.getElementById('dateShow').checked;
  const dx = v('dateX'), dy = v('dateY'), dfs = v('dateFS');
  const [dr, dg, db] = hexToRgb(document.getElementById('dateColor').value);
  const weekShow = document.getElementById('weekShow').checked;
  const wx = v('weekX'), wy = v('weekY');
  const [wr, wg, wb] = hexToRgb(document.getElementById('weekColor').value);

  o.textContent = `// === 默认时钟配置 (自动生成) ===
// Logo
#define LOGO_BLOCK_SIZE  ${bs}
#define LOGO_GAP         ${lgap}
#define LOGO_START_Y     ${ly}

// ClockConfig 默认值
ClockConfig ConfigManager::clockConfig = {
  .time = {${tfs}, ${tx}, ${ty}, ${tr}, ${tg}, ${tb}},
  .date = {${dateShow}, ${dfs}, ${dx}, ${dy}, ${dr}, ${dg}, ${db}},
  .week = {${weekShow}, ${wx}, ${wy}, ${wr}, ${wg}, ${wb}},
  .image = {false, 0, 0, 64, 64}
};`;
}

draw();
</script>
</body></html>
